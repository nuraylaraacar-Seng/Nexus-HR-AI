name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          # CI'da Redis ve Groq key yok — sistem bunlarsız çalışabilmeli.
          # Bu da fail-safe davranışın gerçek bir entegrasyon kanıtı.
          REDIS_URL: ""
          Llama_API_KEY: ""
        run: pytest Backend/ -v --cov=Backend --cov-report=term-missing

      - name: Verify app boots without optional dependencies
        run: python -c "from Backend.main import app; print('App import OK')"
